name: Daily Heartbeat

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *' # 7 AM UTC -> 8 AM WAT
  workflow_dispatch:

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run heartbeat
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python heartbeat.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pulse.txt README.md # <-- ADDED README.md HERE
          git diff --staged --quiet && { echo "No new intel found"; exit 0; }
          git commit -m "chore: live dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

